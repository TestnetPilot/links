<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TestnetPilot - Early Web3 Access</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        body {
            background: radial-gradient(circle at top center, #0a192f 0%, #050a10 100%);
            color: white;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        body::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: radial-gradient(rgba(59, 130, 246, 0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            z-index: -1;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .btn-active:active {
            transform: scale(0.96);
            background: rgba(59, 130, 246, 0.15);
        }

        .logo-container {
            box-shadow: 0 0 50px rgba(59, 130, 246, 0.3);
            animation: pulse-glow 4s infinite ease-in-out;
        }

        @keyframes pulse-glow {
            0%, 100% { transform: scale(1); filter: brightness(1); }
            50% { transform: scale(1.02); filter: brightness(1.2); }
        }
    </style>
</head>
<body class="p-6 text-center">

    <div class="mt-8 mb-10">
        <div class="w-40 h-40 bg-gradient-to-br from-blue-500 to-blue-700 rounded-[2.8rem] flex items-center justify-center logo-container">
            <span class="text-8xl font-bold text-white">T</span>
        </div>
    </div>

    <h1 class="text-4xl font-bold mb-2 tracking-tight">Welcome, Pilot</h1>
    <p class="text-cyan-400 text-lg font-medium mb-10 opacity-90">Your Gateway to the Future</p>

    <div class="glass-card w-full max-w-sm p-7 rounded-[2rem] text-left mb-10 space-y-5">
        <div class="flex items-center gap-4">
            <div class="p-2 bg-blue-500/10 rounded-xl text-cyan-400">
                <i class="fas fa-rocket"></i>
            </div>
            <span class="text-sm font-medium text-gray-300">Early Access Testnet Guides</span>
        </div>
        <div class="flex items-center gap-4">
            <div class="p-2 bg-blue-500/10 rounded-xl text-cyan-400">
                <i class="fas fa-check-circle"></i>
            </div>
            <span class="text-sm font-medium text-gray-300">Verified Crypto Airdrops</span>
        </div>
        <div class="flex items-center gap-4">
            <div class="p-2 bg-blue-500/10 rounded-xl text-cyan-400">
                <i class="fas fa-bolt"></i>
            </div>
            <span class="text-sm font-medium text-gray-300">Direct Web3 Project Insights</span>
        </div>
    </div>

    <div class="w-full max-w-sm space-y-4 mb-16">
        <a href="https://t.me/TestnetPilot_X" target="_blank" class="glass-card btn-active flex items-center p-4 rounded-2xl">
            <i class="fab fa-telegram text-2xl w-12 text-blue-400"></i>
            <span class="flex-1 font-semibold text-left">Telegram Community</span>
            <i class="fas fa-chevron-right text-[10px] text-gray-600"></i>
        </a>

        <a href="https://x.com/TestnetPilot_X" target="_blank" class="glass-card btn-active flex items-center p-4 rounded-2xl">
            <i class="fa-brands fa-x-twitter text-2xl w-12 text-white"></i>
            <span class="flex-1 font-semibold text-left">Follow on X</span>
            <i class="fas fa-chevron-right text-[10px] text-gray-600"></i>
        </a>

        <a href="https://youtube.com/@testnetpilot_x" target="_blank" class="glass-card btn-active flex items-center p-4 rounded-2xl">
            <i class="fab fa-youtube text-2xl w-12 text-red-500"></i>
            <span class="flex-1 font-semibold text-left">Watch on YouTube</span>
            <i class="fas fa-chevron-right text-[10px] text-gray-600"></i>
        </a>

        <a href="https://www.tiktok.com/@testnetpilot_x" target="_blank" class="glass-card btn-active flex items-center p-4 rounded-2xl">
            <i class="fab fa-tiktok text-2xl w-12 text-pink-400"></i>
            <span class="flex-1 font-semibold text-left">TikTok Official</span>
            <i class="fas fa-chevron-right text-[10px] text-gray-600"></i>
        </a>

        <a href="https://www.instagram.com/testnetpilot_x/" target="_blank" class="glass-card btn-active flex items-center p-4 rounded-2xl">
            <i class="fab fa-instagram text-2xl w-12 text-orange-400"></i>
            <span class="flex-1 font-semibold text-left">Instagram Official</span>
            <i class="fas fa-chevron-right text-[10px] text-gray-600"></i>
        </a>
    </div>

    <footer class="text-gray-600 text-[10px] tracking-[0.4em] uppercase pb-8">
        © 2026 TESTNETPILOT. CORE EDITION.
    </footer>

</body>
</html>
