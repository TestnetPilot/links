<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TestnetPilot | Interactive Edition</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --on: 0; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: #05070a; /* මුලින් අඳුරුයි */
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            transition: background 0.6s ease;
        }

        /* Lamp එක (Logo) */
        .logo-box {
            width: 120px;
            height: 120px;
            background: #1a1a1a;
            border-radius: 30px;
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 60px;
            font-weight: 800;
            color: #333;
            cursor: pointer;
            box-shadow: 0 0 0px rgba(0, 210, 255, 0);
            transition: all 0.4s ease;
            z-index: 100;
        }

        /* Lamp එක ON වූ විට පෙනුම */
        body[data-on="true"] .logo-box {
            background: linear-gradient(135deg, #00d2ff 0%, #3a7bd5 100%);
            color: white;
            box-shadow: 0 0 40px rgba(0, 210, 255, 0.6);
        }

        .card {
            text-align: center;
            width: 100%;
            max-width: 450px;
            padding: 20px;
        }

        /* අනෙකුත් කොටස් මුලින් සැඟවී පවතී */
        .content-area {
            opacity: 0;
            transform: translateY(20px);
            pointer-events: none;
            transition: all 0.6s ease;
        }

        body[data-on="true"] .content-area {
            opacity: 1;
            transform: translateY(0);
            pointer-events: auto;
        }

        h1 { font-size: 32px; margin-bottom: 8px; opacity: 0.9; }
        .welcome-msg { color: #00d2ff; font-weight: 500; margin-bottom: 25px; }

        .info-box {
            text-align: left;
            background: rgba(255, 255, 255, 0.05);
            padding: 20px;
            border-radius: 20px;
            margin-bottom: 25px;
        }

        .info-item { display: flex; align-items: start; margin-bottom: 12px; font-size: 14.5px; }
        .info-item i { color: #00d2ff; margin-right: 12px; margin-top: 3px; }

        .links-container { display: flex; flex-direction: column; gap: 12px; }

        .link-card {
            display: flex;
            align-items: center;
            padding: 16px 20px;
            background: rgba(255, 255, 255, 0.07);
            border-radius: 18px;
            text-decoration: none;
            color: white;
            font-weight: 600;
            transition: 0.25s;
        }

        .link-card i { width: 28px; font-size: 22px; margin-right: 12px; }

        /* Touch Highlight Colors */
        .telegram:active { color: #26A5E4; background: rgba(38, 165, 228, 0.1); }
        .x-twitter:active { color: #ffffff; background: rgba(255, 255, 255, 0.1); }
        .youtube:active { color: #FF0000; background: rgba(255, 0, 0, 0.1); }
        .instagram:active { color: #E1306C; background: rgba(225, 48, 108, 0.1); }

        .footer { margin-top: 35px; font-size: 12px; opacity: 0.3; }

        /* Background Animation (On වූ විට පමණි) */
        .bg-glow {
            position: fixed;
            top: 50%; left: 50%;
            width: 100vw; height: 100vh;
            background: radial-gradient(circle, rgba(0,210,255,0.1) 0%, rgba(0,0,0,0) 70%);
            transform: translate(-50%, -50%);
            z-index: -1;
            display: none;
        }
        body[data-on="true"] .bg-glow { display: block; }
    </style>
</head>
<body data-on="false">

    <div class="bg-glow"></div>

    <div class="card">
        <div class="logo-box" onclick="toggleLamp()">T</div>
        
        <div class="content-area">
            <h1>TestnetPilot</h1>
            <p class="welcome-msg">Welcome to the Future of Web3!</p>

            <div class="info-box">
                <div class="info-item"><i class="fa-solid fa-rocket"></i><span>Early Testnet Guides</span></div>
                <div class="info-item"><i class="fa-solid fa-circle-check"></i><span>Verified Airdrops</span></div>
                <div class="info-item"><i class="fa-solid fa-bolt"></i><span>Deep Insights</span></div>
            </div>

            <div class="links-container">
                <a href="https://t.me/TestnetPilot_X" class="link-card telegram"><i class="fa-brands fa-telegram"></i> Telegram</a>
                <a href="https://x.com/TestnetPilot_X" class="link-card x-twitter"><i class="fa-brands fa-x-twitter"></i> Follow on X</a>
                <a href="https://youtube.com/@testnetpilot_x" class="link-card youtube"><i class="fa-brands fa-youtube"></i> YouTube</a>
                <a href="https://www.instagram.com/testnetpilot_x/" class="link-card instagram"><i class="fa-brands fa-instagram"></i> Instagram</a>
            </div>

            <p class="footer">© 2026 TESTNETPILOT. TAP LOGO TO TOGGLE.</p>
        </div>
    </div>

    <script>
        let isOn = false;
        const body = document.body;

        function toggleLamp() {
            isOn = !isOn;
            
            // Set attribute for CSS
            body.setAttribute('data-on', isOn);

            if (isOn) {
                // Lamp ON වන විට Animation
                gsap.to(body, { backgroundColor: "#0a0b10", duration: 0.6 });
                gsap.from(".content-area", { y: 20, opacity: 0, duration: 0.5, ease: "power2.out" });
            } else {
                // Lamp OFF වන විට Animation
                gsap.to(body, { backgroundColor: "#05070a", duration: 0.6 });
            }
        }
    </script>
</body>
</html>
