<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Testnet Pilot X - Official Flight Paths</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        /* Animated Background Gradient */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #f0f6fc;
            
            /* Gradient Settings */
            background: linear-gradient(-45deg, #0d1117, #161b22, #0d1117, #1a202c);
            background-size: 400% 400%;
            animation: gradientAnimation 15s ease infinite;
            min-height: 100vh;
        }

        /* Background Animation Keyframes */
        @keyframes gradientAnimation {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Profile Area */
        .profile-container {
            text-align: center;
            margin-bottom: 30px;
        }
        .profile-img {
            width: 96px;
            height: 96px;
            border-radius: 50%;
            border: 3px solid #30363d;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            margin-bottom: 15px;
            /* Using your actual GitHub profile pic */
            background-image: url('https://github.com/TestnetPilot.png');
            background-size: cover;
            display: inline-block;
        }
        h1 { font-size: 22px; color: #f0f6fc; margin: 0; font-weight: 700; }
        .subtitle { color: #8b949e; margin: 5px 0 0; font-size: 14px; display: flex; align-items: center; justify-content: center; gap: 5px; }

        /* Links Container */
        .links-container {
            width: 100%;
            max-width: 400px;
        }

        /* Link Card Style */
        .link-card {
            background: rgba(22, 27, 34, 0.8); /* Semi-transparent */
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 14px;
            text-decoration: none;
            color: #c9d1d9;
            display: flex;
            align-items: center;
            font-weight: 500;
            font-size: 16px;
            transition: all 0.3s ease;
            backdrop-filter: blur(5px); /* Modern blur effect */
        }

        /* Icon Style inside Link Card */
        .link-card i {
            font-size: 20px;
            margin-right: 15px;
            width: 25px; /* Fixed width for alignment */
            text-align: center;
        }

        /* Hover Effects */
        .link-card:hover {
            background: #1f242c;
            border-color: #8b949e;
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            color: #58a6ff;
        }

        /* Specific Icon Colors on Hover */
        .link-card:hover i.fa-x-twitter { color: #fff; }
        .link-card:hover i.fa-telegram { color: #26A5E4; }
        .link-card:hover i.fa-youtube { color: #FF0000; }
        .link-card:hover i.fa-tiktok { color: #ff0050; }
        .link-card:hover i.fa-instagram { color: #E1306C; }
        .link-card:hover i.fa-github { color: #fff; }

        /* Footer */
        .footer {
            margin-top: 50px;
            font-size: 12px;
            color: #484f58;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="profile-container">
        <div class="profile-img"></div>
        <h1>Testnet Pilot X</h1>
        <p class="subtitle"><i class="fas fa-globe"></i> Official Flight Paths</p>
    </div>

    <div class="links-container">
        <a href="https://x.com/TestnetPilot_X" class="link-card" target="_blank">
            <i class="fab fa-x-twitter"></i> Twitter
        </a>
        <a href="https://t.me/TestnetPilot_X" class="link-card" target="_blank">
            <i class="fab fa-telegram"></i> Telegram
        </a>
        <a href="https://youtube.com/@testnetpilot_x" class="link-card" target="_blank">
            <i class="fab fa-youtube"></i> YouTube
        </a>
        <a href="https://www.tiktok.com/@testnetpilot_x" class="link-card" target="_blank">
            <i class="fab fa-tiktok"></i> TikTok
        </a>
        <a href="https://www.instagram.com/testnetpilot_x/" class="link-card" target="_blank">
            <i class="fab fa-instagram"></i> Instagram
        </a>
        <a href="https://github.com/TestnetPilot" class="link-card" target="_blank">
            <i class="fab fa-github"></i> GitHub
        </a>
    </div>

    <div class="footer">
        © 2026 Testnet Pilot X | Built with AI
    </div>

</body>
</html>
