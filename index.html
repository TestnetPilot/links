<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TestnetPilot - Early Web3 Access</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        body {
            background-color: #050a10;
            color: white;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            position: relative;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .btn-active:active {
            transform: scale(0.95);
            background: rgba(59, 130, 246, 0.2);
        }

        .logo-container {
            box-shadow: 0 0 60px rgba(59, 130, 246, 0.5);
            animation: pulse-glow 4s infinite ease-in-out;
        }

        @keyframes pulse-glow {
            0%, 100% { transform: scale(1); box-shadow: 0 0 60px rgba(59, 130, 246, 0.5); }
            50% { transform: scale(1.03); box-shadow: 0 0 80px rgba(59, 130, 246, 0.7); }
        }

        /* 24h Live Indicator Animation */
        @keyframes pulse-red {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }
        .live-indicator {
            animation: pulse-red 2s infinite;
        }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen p-6 text-center">

    <div class="absolute top-6 left-6 flex items-center gap-3 bg-red-950/30 px-4 py-2 rounded-full border border-red-500/30">
        <span class="relative flex h-3 w-3">
            <span class="live-indicator animate-ping absolute inline-flex h-full w-full rounded-full bg-red-500 opacity-75"></span>
            <span class="relative inline-flex rounded-full h-3 w-3 bg-red-600"></span>
        </span>
        <span class="text-xs font-bold text-red-400 tracking-wider uppercase">24H Live</span>
    </div>

    <div class="mt-20 mb-10">
        <div class="w-40 h-40 bg-gradient-to-br from-blue-400 to-blue-600 rounded-[2.5rem] flex items-center justify-center logo-container">
            <span class="text-8xl font-bold">T</span>
        </div>
    </div>

    <h1 class="text-4xl font-bold mb-2 tracking-tight">Welcome, Pilot</h1>
    <p class="text-cyan-400 text-lg font-medium mb-10">Your Gateway to the Future</p>

    <div class="glass-card w-full max-w-sm p-7 rounded-[2rem] text-left mb-10 space-y-5">
        <div class="flex items-center gap-4">
            <div class="p-2 bg-blue-500/10 rounded-xl">
                <i class="fas fa-rocket text-cyan-400"></i>
            </div>
            <span class="text-md text-gray-200">Early Access Testnet Guides</span>
        </div>
        <div class="flex items-center gap-4">
            <div class="p-2 bg-blue-500/10 rounded-xl">
                <i class="fas fa-check-circle text-cyan-400"></i>
            </div>
            <span class="text-md text-gray-200">Verified Crypto Airdrops</span>
        </div>
        <div class="flex items-center gap-4">
            <div class="p-2 bg-blue-500/10 rounded-xl">
                <i class="fas fa-bolt text-cyan-400"></i>
            </div>
            <span class="text-md text-gray-200">Direct Web3 Project Insights</span>
        </div>
    </div>

    <div class="w-full max-w-sm space-y-4 mb-12">
        
        <a href="https://t.me/TestnetPilot_X" target="_blank" class="glass-card btn-active flex items-center p-4 rounded-2xl">
            <i class="fab fa-telegram text-2xl w-12 text-blue-400"></i>
            <span class="flex-1 font-semibold text-left">Telegram Community</span>
            <i class="fas fa-chevron-right text-xs text-gray-500"></i>
        </a>

        <a href="https://x.com/TestnetPilot_X" target="_blank" class="glass-card btn-active flex items-center p-4 rounded-2xl">
            <i class="fa-brands fa-x-twitter text-2xl w-12 text-white"></i>
            <span class="flex-1 font-semibold text-left">Follow on X</span>
            <i class="fas fa-chevron-right text-xs text-gray-500"></i>
        </a>

        <a href="https://youtube.com/@testnetpilot_x" target="_blank" class="glass-card btn-active flex items-center p-4 rounded-2xl">
            <i class="fab fa-youtube text-2xl w-12 text-red-500"></i>
            <span class="flex-1 font-semibold text-left">Watch on YouTube</span>
            <i class="fas fa-chevron-right text-xs text-gray-500"></i>
        </a>

        <a href="https://www.tiktok.com/@testnetpilot_x" target="_blank" class="glass-card btn-active flex items-center p-4 rounded-2xl">
            <i class="fab fa-tiktok text-2xl w-12 text-pink-500"></i>
            <span class="flex-1 font-semibold text-left">TikTok Official</span>
            <i class="fas fa-chevron-right text-xs text-gray-500"></i>
        </a>

        <a href="https://www.instagram.com/testnetpilot_x/" target="_blank" class="glass-card btn-active flex items-center p-4 rounded-2xl">
            <i class="fab fa-instagram text-2xl w-12 text-orange-400"></i>
            <span class="flex-1 font-semibold text-left">Instagram Official</span>
            <i class="fas fa-chevron-right text-xs text-gray-500"></i>
        </a>

    </div>

    <footer class="text-gray-600 text-[10px] tracking-[0.3em] uppercase pb-10">
        © 2026 TESTNETPILOT. CORE EDITION.
    </footer>

</body>
</html>
