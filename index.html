<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TestnetPilot - Early Web3 Access</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            background-color: #050a10;
            color: white;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        /* ටච් කරන විට සිදුවන ඇනිමේෂන් එක */
        .btn-active:active {
            transform: scale(0.95);
            background: rgba(59, 130, 246, 0.2);
            border-color: rgba(59, 130, 246, 0.5);
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.3);
        }

        /* Hover effect (PC සඳහා) */
        @media (min-width: 1024px) {
            .btn-active:hover {
                transform: translateY(-3px);
                background: rgba(255, 255, 255, 0.08);
                border-color: rgba(34, 211, 238, 0.4);
                box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
            }
        }

        .logo-glow {
            box-shadow: 0 0 50px rgba(59, 130, 246, 0.4);
            animation: pulse-glow 3s infinite;
        }

        @keyframes pulse-glow {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.05); opacity: 0.8; }
        }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen p-6 text-center">

    <div class="mb-6">
        <div class="w-28 h-28 bg-gradient-to-br from-blue-400 to-blue-600 rounded-3xl flex items-center justify-center logo-glow">
            <span class="text-6xl font-bold">T</span>
        </div>
    </div>

    <div class="mb-4">
        <span class="bg-blue-950/40 text-cyan-400 px-4 py-1 rounded-full text-xs font-semibold border border-cyan-500/30 tracking-widest uppercase">
            <span class="inline-block w-2 h-2 bg-cyan-400 rounded-full mr-2 animate-ping"></span>
            124 Pilots Joined
        </span>
    </div>

    <h1 class="text-4xl font-bold mb-1 tracking-tight">Welcome, Pilot</h1>
    <p class="text-cyan-400 text-md font-medium mb-8">Your Gateway to the Future</p>

    <div class="glass-card w-full max-w-sm p-6 rounded-3xl text-left mb-8 space-y-4">
        <div class="flex items-center gap-4 group">
            <div class="p-2 bg-blue-500/10 rounded-lg group-hover:bg-blue-500/20 transition-colors">
                <i class="fas fa-rocket text-cyan-400"></i>
            </div>
            <span class="text-sm text-gray-200">Early Access Testnet Guides</span>
        </div>
        <div class="flex items-center gap-4 group">
            <div class="p-2 bg-blue-500/10 rounded-lg group-hover:bg-blue-500/20 transition-colors">
                <i class="fas fa-check-circle text-cyan-400"></i>
            </div>
            <span class="text-sm text-gray-200">Verified Crypto Airdrops</span>
        </div>
        <div class="flex items-center gap-4 group">
            <div class="p-2 bg-blue-500/10 rounded-lg group-hover:bg-blue-500/20 transition-colors">
                <i class="fas fa-bolt text-cyan-400"></i>
            </div>
            <span class="text-sm text-gray-200">Direct Web3 Project Insights</span>
        </div>
    </div>

    <div class="w-full max-w-sm space-y-4">
        
        <a href="https://t.me/TestnetPilot_X" target="_blank" class="glass-card btn-active flex items-center p-4 rounded-2xl">
            <i class="fab fa-telegram text-2xl w-12 text-blue-400"></i>
            <span class="flex-1 font-semibold text-left">Telegram Community</span>
            <i class="fas fa-chevron-right text-xs text-gray-500"></i>
        </a>

        <a href="https://x.com/TestnetPilot_X" target="_blank" class="glass-card btn-active flex items-center p-4 rounded-2xl">
            <i class="fab fa-x-twitter text-2xl w-12 text-white"></i>
            <span class="flex-1 font-semibold text-left">Follow on X</span>
            <i class="fas fa-chevron-right text-xs text-gray-500"></i>
        </a>

        <a href="https://youtube.com/@testnetpilot_x" target="_blank" class="glass-card btn-active flex items-center p-4 rounded-2xl">
            <i class="fab fa-youtube text-2xl w-12 text-red-500"></i>
            <span class="flex-1 font-semibold text-left">Watch on YouTube</span>
            <i class="fas fa-chevron-right text-xs text-gray-500"></i>
        </a>

        <a href="https://www.tiktok.com/@testnetpilot_x" target="_blank" class="glass-card btn-active flex items-center p-4 rounded-2xl">
            <i class="fab fa-tiktok text-2xl w-12 text-pink-500"></i>
            <span class="flex-1 font-semibold text-left">TikTok Official</span>
            <i class="fas fa-chevron-right text-xs text-gray-500"></i>
        </a>

        <a href="https://www.instagram.com/testnetpilot_x/" target="_blank" class="glass-card btn-active flex items-center p-4 rounded-2xl">
            <i class="fab fa-instagram text-2xl w-12 text-orange-400"></i>
            <span class="flex-1 font-semibold text-left">Instagram Official</span>
            <i class="fas fa-chevron-right text-xs text-gray-500"></i>
        </a>

    </div>

    <footer class="mt-12 text-gray-600 text-[10px] tracking-[0.2em] uppercase pb-8">
        © 2026 TESTNETPILOT. CORE EDITION.
    </footer>

</body>
</html>
