<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Testnet Pilot X | Official Links</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: white;
            background: linear-gradient(-45deg, #020617, #1e1b4b, #312e81, #020617);
            background-size: 400% 400%;
            animation: gradientBG 10s ease infinite;
            min-height: 100vh;
            overflow-x: hidden;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .logo-area {
            text-align: center;
            margin-bottom: 20px;
        }

        .main-logo {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 4px solid #38bdf8;
            box-shadow: 0 0 25px rgba(56, 189, 248, 0.4);
            object-fit: cover;
            background-color: #1e293b;
        }

        .welcome-box {
            text-align: center;
            margin-bottom: 30px;
        }

        h1 { font-size: 28px; margin: 10px 0; color: #f8fafc; font-weight: 800; }
        .welcome-text { color: #38bdf8; font-size: 18px; font-weight: 600; margin: 0; text-transform: uppercase; letter-spacing: 1px; }
        .description { color: #94a3b8; font-size: 14px; margin-top: 10px; max-width: 320px; line-height: 1.5; }

        .links-container { width: 100%; max-width: 400px; }

        .link-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 16px 20px;
            margin-bottom: 15px;
            text-decoration: none;
            color: white;
            display: flex;
            align-items: center;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            backdrop-filter: blur(12px);
        }

        .link-card i {
            font-size: 24px;
            margin-right: 20px;
            width: 30px;
            text-align: center;
        }

        /* Official Brand Colors */
        .fa-x-twitter { color: #ffffff; }
        .fa-telegram { color: #229ED9; }
        .fa-youtube { color: #FF0000; }
        .fa-tiktok { color: #ff0050; text-shadow: 1px 1px #00f2ea; }
        .fa-instagram { color: #E1306C; }
        .fa-github { color: #f0f6fc; }

        .link-card:hover {
            transform: translateY(-5px) scale(1.02);
            background: rgba(255, 255, 255, 0.12);
            border-color: rgba(56, 189, 248, 0.6);
            box-shadow: 0 10px 25px rgba(0,0,0,0.4);
        }

        .link-card:active { transform: scale(0.98); }

        .footer { margin-top: 60px; font-size: 11px; color: rgba(148, 163, 184, 0.6); letter-spacing: 2px; font-weight: 600; }
    </style>
</head>
<body>

    <div class="logo-area">
        <img src="https://github.com/TestnetPilot.png" alt="Logo" class="main-logo">
    </div>

    <div class="welcome-box">
        <p class="welcome-text">Welcome to</p>
        <h1>Testnet Pilot X</h1>
        <p class="description">Exploring the decentralized frontier. Join our official community across all platforms.</p>
    </div>

    <div class="links-container">
        <a href="https://x.com/TestnetPilot_X" class="link-card" target="_blank">
            <i class="fab fa-x-twitter"></i> X (Twitter)
        </a>
        <a href="https://t.me/TestnetPilot_X" class="link-card" target="_blank">
            <i class="fab fa-telegram"></i> Telegram Community
        </a>
        <a href="https://youtube.com/@testnetpilot_x" class="link-card" target="_blank">
            <i class="fab fa-youtube"></i> YouTube Channel
        </a>
        <a href="https://www.tiktok.com/@testnetpilot_x" class="link-card" target="_blank">
            <i class="fab fa-tiktok"></i> TikTok Profile
        </a>
        <a href="https://www.instagram.com/testnetpilot_x/" class="link-card" target="_blank">
            <i class="fab fa-instagram"></i> Instagram
        </a>
        <a href="https://github.com/TestnetPilot" class="link-card" target="_blank">
            <i class="fab fa-github"></i> GitHub
        </a>
    </div>

    <div class="footer">
        © 2026 TESTNET PILOT X | DECENTRALIZED HUB
    </div>

</body>
</html>
